<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro</title>
</head>
<body>
    <h1>Editar Registro do Diário</h1>

    <form method="POST">
        <label for="descricao">Descrição:</label><br>
        <textarea name="descricao" rows="5" cols="60" required>{{ registro.descricao }}</textarea>
        <br><br>

        <label for="clima">Clima:</label><br>
        <input type="text" name="clima" value="{{ registro.clima or '' }}">
        <br><br>

        <label for="ocorrencias">Ocorrências:</label><br>
        <textarea name="ocorrencias" rows="4" cols="60">{{ registro.ocorrencias or '' }}</textarea>
        <br><br>

        <h3>Efetivo</h3>
        <div id="lista-funcionarios">
            {% if efetivo_formatado %}
                {% for item in efetivo_formatado %}
                <div class="funcionario-item">
                    <input type="number" name="quantidade[]" placeholder="Quantidade" min="1" value="{{ item.quantidade }}">

                    <select name="funcao[]">
                        <option value="">Selecione a função</option>
                        <option value="Servente" {% if item.funcao == 'Servente' %}selected{% endif %}>Servente</option>
                        <option value="Rasteleiro" {% if item.funcao == 'Rasteleiro' %}selected{% endif %}>Rasteleiro</option>
                        <option value="Operador de rolo" {% if item.funcao == 'Operador de rolo' %}selected{% endif %}>Operador de rolo</option>
                        <option value="Pedreiro" {% if item.funcao == 'Pedreiro' %}selected{% endif %}>Pedreiro</option>
                        <option value="Mestre de obras" {% if item.funcao == 'Mestre de obras' %}selected{% endif %}>Mestre de obras</option>
                        <option value="Encarregado" {% if item.funcao == 'Encarregado' %}selected{% endif %}>Encarregado</option>
                        <option value="Operador de vibroacabadora" {% if item.funcao == 'Operador de vibroacabadora' %}selected{% endif %}>Operador de vibroacabadora</option>
                        <option value="Motorista" {% if item.funcao == 'Motorista' %}selected{% endif %}>Motorista</option>
                        <option value="Auxiliar" {% if item.funcao == 'Auxiliar' %}selected{% endif %}>Auxiliar</option>
                    </select>

                    <button type="button" onclick="removerLinha(this)">Remover</button>
                </div>
                {% endfor %}
            {% else %}
                <div class="funcionario-item">
                    <input type="number" name="quantidade[]" placeholder="Quantidade" min="1">

                    <select name="funcao[]">
                        <option value="">Selecione a função</option>
                        <option value="Servente">Servente</option>
                        <option value="Rasteleiro">Rasteleiro</option>
                        <option value="Operador de rolo">Operador de rolo</option>
                        <option value="Pedreiro">Pedreiro</option>
                        <option value="Mestre de obras">Mestre de obras</option>
                        <option value="Encarregado">Encarregado</option>
                        <option value="Operador de vibroacabadora">Operador de vibroacabadora</option>
                        <option value="Motorista">Motorista</option>
                        <option value="Auxiliar">Auxiliar</option>
                    </select>

                    <button type="button" onclick="removerLinha(this)">Remover</button>
                </div>
            {% endif %}
        </div>

        <br>
        <button type="button" onclick="adicionarLinha()">Adicionar funcionário</button>
        <br><br>

        <button type="submit">Salvar alterações</button>
    </form>

    <script>
        function adicionarLinha() {
            const div = document.createElement('div');
            div.classList.add('funcionario-item');
            div.innerHTML = `
                <input type="number" name="quantidade[]" placeholder="Quantidade" min="1">

                <select name="funcao[]">
                    <option value="">Selecione a função</option>
                    <option value="Servente">Servente</option>
                    <option value="Rasteleiro">Rasteleiro</option>
                    <option value="Operador de rolo">Operador de rolo</option>
                    <option value="Pedreiro">Pedreiro</option>
                    <option value="Mestre de obras">Mestre de obras</option>
                    <option value="Encarregado">Encarregado</option>
                    <option value="Operador de vibroacabadora">Operador de vibroacabadora</option>
                    <option value="Motorista">Motorista</option>
                    <option value="Auxiliar">Auxiliar</option>
                </select>

                <button type="button" onclick="removerLinha(this)">Remover</button>
            `;
            document.getElementById('lista-funcionarios').appendChild(div);
        }

        function removerLinha(botao) {
            botao.parentElement.remove();
        }
    </script>
</body>
</html>
